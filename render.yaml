services:
  - type: web
    name: igreja-aba
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --threads=4 --timeout=120 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://igreja-aba.onrender.com
      - key: DB_DIR
        value: /opt/render/project/src/database
      - key: RENDER
        value: "true"
    disk:
      name: database
      mountPath: /opt/render/project/src/database
      sizeGB: 1
