<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Igreja ABA — Login</title>
  <link rel="icon" type="image/x-icon"  href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180"    href="/static/apple-touch-icon.png">
  <meta name="theme-color" content="#0d2a6b">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow+Condensed:wght@400;500&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #0d2a6b 0%, #1a4db5 55%, #0a5fa0 100%);
      font-family: 'Barlow', sans-serif;
    }

    .card {
      width: 340px;
      max-width: 92%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
    }

    .brand-top {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .brand-main {
      font-family: 'Cinzel', serif;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 18px rgba(30, 143, 212, 0.35);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 6px;
      width: 200px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
    }

    .brand-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.75);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 5px 16px;
      margin-bottom: 26px;
    }

    /* ── Form ── */
    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .fgroup {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input.has-toggle {
      padding-right: 42px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.17);
    }

    /* ── Eye toggle ── */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.45);
      transition: color 0.2s;
    }

    .eye-btn:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    /* ── Submit ── */
    .btn-login {
      width: 100%;
      margin-top: 6px;
      background: linear-gradient(90deg, #29b6d8 0%, #1e8fd4 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
      position: relative;
    }

    .btn-login:hover { opacity: 0.88; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Erro ── */
    .err {
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ff8888;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 6px;
      display: none;
      text-align: center;
    }

    /* ── Spinner inline ── */
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">

    <div class="brand">
      <p class="brand-top">Igreja</p>
      <h1 class="brand-main">ABA</h1>
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>
      <p class="brand-sub">Um lar para pertencer</p>
    </div>

    <span class="badge">Registro de Culto</span>

    <div class="form">

      <div class="fgroup">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
      </div>

      <div class="fgroup">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input id="senha" type="password" class="has-toggle" autocomplete="current-password" />
          <button type="button" class="eye-btn" id="eye-btn" aria-label="Mostrar/ocultar senha" onclick="toggleSenha()">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="doLogin()">Entrar</button>
      <div class="err" id="errMsg"></div>

    </div>

  </div>

  <script>
    // Enter nos campos dispara login
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function toggleSenha() {
      var input = document.getElementById('senha');
      var icon  = document.getElementById('eye-icon');
      var oculto = input.type === 'password';
      input.type = oculto ? 'text' : 'password';
      icon.innerHTML = oculto
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    async function doLogin() {
      const btn   = document.getElementById('btnLogin');
      const err   = document.getElementById('errMsg');
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!email || !senha) { showErr('Preencha e-mail e senha.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spin"></span> Entrando...';
      err.style.display = 'none';

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const d = await r.json();
        if (r.ok && d.ok) {
          btn.innerHTML = '✓ Bem-vindo(a), ' + d.nome + '!';
          setTimeout(() => { window.location.href = '/app'; }, 700);
        } else {
          showErr(d.erro || 'Usuário ou senha incorretos.');
          btn.innerHTML = 'Entrar';
          btn.disabled = false;
        }
      } catch (e) {
        showErr('Erro de conexão. Tente novamente.');
        btn.innerHTML = 'Entrar';
        btn.disabled = false;
      }
    }

    function showErr(m) {
      const e = document.getElementById('errMsg');
      e.textContent = m;
      e.style.display = 'block';
    }
  </script>

</body>
</html>
